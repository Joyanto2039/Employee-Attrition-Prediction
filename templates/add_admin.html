<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: #060b09; 
            min-height: 100vh; 
            width: 100vw;
            display: flex; 
            color: white; 
            overflow-x: hidden;
        }
        
        .workspace-wrapper { 
            display: flex; 
            width: 100%; 
            min-height: 100vh;
            background: #0b1410; 
            flex-direction: row;
        }

        .info-panel { 
            width: 25%; 
            background: linear-gradient(145deg, #0a2218, #040a07); 
            padding: 40px 30px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            border-right: 3px solid #22c55e; 
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
        }
        .info-panel-header h2 { font-size: clamp(28px, 3.5vw, 44px); font-weight: 800; color: #22c55e; line-height: 1.2; text-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
        .info-panel-header p { font-size: clamp(15px, 1.5vw, 20px); color: #a7f3d0; margin-top: 20px; font-weight: 600; }
        
        .brand-hint { background: rgba(217, 70, 239, 0.1); border-left: 4px solid #d946ef; padding: 20px; border-radius: 0 16px 16px 0; margin-top: 30px; }
        .brand-hint h4 { color: #d946ef; font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .brand-hint p { color: #f5f5f5; font-size: 14px; line-height: 1.5; }

        .grid-panel { 
            width: 75%; 
            margin-left: 25%; 
            padding: 60px clamp(20px, 6vw, 100px); 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        form { width: 100%; }

        .input-matrix { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px; 
            width: 100%;
        }
        
        .full-width-field { grid-column: span 2; }

        .matrix-field { display: flex; flex-direction: column; }
        .matrix-field label { font-size: 14px; font-weight: 700; color: #6ee7b7; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        
        .matrix-field input, .matrix-field select { 
            width: 100%; 
            padding: 16px 20px; 
            border-radius: 16px; 
            border: 2px solid #10b981; 
            background: #060b09; 
            color: white; 
            font-size: 16px; 
            outline: none; 
            transition: 0.3s; 
        }
        .matrix-field input:focus, .matrix-field select:focus { border-color: #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
        
        .file-upload-box { background: #060b09; border: 2px dashed #10b981; border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; cursor: pointer; transition: 0.3s; overflow: hidden; }
        .file-upload-box:hover { border-color: #22c55e; background: rgba(34, 197, 94, 0.02); }
        .file-upload-box input[type="file"] { border: none; background: transparent; padding: 0; margin: 0; cursor: pointer; font-size: 16px; width: 100%; }

        .submit-container { margin-top: 40px; display: flex; align-items: center; width: 100%; }
        
        button { 
            width: 100%;
            padding: 18px; 
            background: linear-gradient(135deg, #22c55e, #10b981); 
            color: #060b09; 
            border: none; 
            border-radius: 18px; 
            font-size: 18px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.3); 
        }
        button:hover { transform: translateY(-3px); color: white; box-shadow: 0 0 40px #22c55e; }
        
        .back-link { 
            color: #a7f3d0; 
            text-decoration: none; 
            font-size: 16px; 
            font-weight: 700; 
            white-space: nowrap;
            transition: 0.2s;
            margin-top: 20px;
        }
        .back-link:hover { color: #22c55e; text-decoration: underline; }

        @media (max-width: 1024px) {
            .info-panel { padding: 30px 20px; }
            .grid-panel { padding: 40px 30px; }
            .input-matrix { gap: 20px; }
        }

        @media (max-width: 768px) {
            .workspace-wrapper { flex-direction: column; }
            .info-panel { 
                position: relative; 
                width: 100%; 
                height: auto; 
                border-right: none; 
                border-bottom: 3px solid #22c55e; 
                padding: 40px 20px;
            }
            .grid-panel { width: 100%; margin-left: 0; padding: 40px 20px; }
            .brand-hint { margin-top: 20px; }
        }

        @media (max-width: 480px) {
            .input-matrix { grid-template-columns: 1fr; }
            .full-width-field { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="workspace-wrapper">
        
        <div class="info-panel">
            <div class="info-panel-header">
                <h2>Create Admin Account</h2>
                <p>Setup a brand new system administrator profile with full data clearance permissions.</p>
                
                <div class="brand-hint">
                    <h4>Security Policy</h4>
                    <p>Admins hold complete control over workforce records. Assign password credentials carefully.</p>
                </div>
            </div>
            
            <a href="/admin_dashboard" class="back-link">← Cancel and Exit</a>
        </div>

        <div class="grid-panel">
            <form action="/save_employee" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="role" value="admin">
                
                <div class="input-matrix">
                    
                    <div class="matrix-field">
                        <label>Admin ID Code</label>
                        <input type="text" name="employee_id" placeholder="e.g. ADMIN002" required>
                    </div>

                    <div class="matrix-field">
                        <label>Full Name</label>
                        <input type="text" name="name" placeholder="Alex Morgan" required>
                    </div>

                    <div class="matrix-field">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="admin.name@company.com" required>
                    </div>

                    <div class="matrix-field">
                        <label>System Password</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>

                    <div class="matrix-field">
                        <label>Management Department</label>
                        <input type="text" name="department" value="Management" required>
                    </div>

                    <div class="matrix-field">
                        <label>Location Hub</label>
                        <input type="text" name="address" placeholder="Dhaka, Bangladesh" required>
                    </div>

                    <div class="matrix-field full-width-field">
                        <label>Monthly Salary ($)</label>
                        <input type="text" name="salary" placeholder="e.g. 60000" required>
                    </div>

                    <div class="matrix-field full-width-field">
                        <label>Upload Profile Avatar</label>
                        <div class="file-upload-box">
                            <input type="file" name="image">
                        </div>
                    </div>

                </div>

                <div class="submit-container">
                    <button type="submit">Save Admin Parameters</button>
                </div>

            </form>
        </div>

    </div>

</body>
</html>

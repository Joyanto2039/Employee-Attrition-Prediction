<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS Global Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: linear-gradient(rgba(7, 2, 13, 0.75), rgba(5, 11, 9, 0.8)), 
                        url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh; 
            width: 100vw;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            overflow-x: hidden;
            padding: 20px;
        }

        .gateway-matrix {
            width: 100%;
            max-width: 750px; 
            background: rgba(18, 7, 43, 0.55); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid rgba(139, 92, 246, 0.5);
            border-radius: 32px;
            padding: 50px 40px; 
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.7),
                0 0 50px rgba(139, 92, 246, 0.25),
                inset 0 0 30px rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .gateway-header {
            text-align: center;
            margin-bottom: 35px;
        }
        .gateway-header h1 {
            font-size: clamp(36px, 5vw, 54px); 
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #22c55e, #8b5cf6, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
        }
        .gateway-header p {
            font-size: clamp(16px, 2vw, 20px); 
            color: #c084fc;
            margin-top: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .access-toggle-container {
            display: flex;
            background: #07020d;
            padding: 8px;
            border-radius: 18px;
            border: 2px solid rgba(139, 92, 246, 0.6);
            margin-bottom: 35px;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.5);
            width: 100%;
        }
        .toggle-btn {
            flex: 1;
            padding: 14px 10px; 
            font-size: clamp(15px, 1.8vw, 18px); 
            font-weight: 700;
            color: #c084fc;
            background: transparent;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            white-space: nowrap;
        }
        .toggle-btn.employee-active {
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            color: white;
            box-shadow: 0 0 25px rgba(217, 70, 239, 0.5);
        }
        .toggle-btn.admin-active {
            background: linear-gradient(135deg, #059669, #22c55e);
            color: #07020d;
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.6);
        }

        .form-matrix {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px; 
            width: 100%;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .input-group label {
            font-size: 13px;
            font-weight: 700;
            color: #f472b6;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .input-group input {
            width: 100%;
            padding: 16px 20px; 
            background: rgba(7, 2, 13, 0.85);
            border: 2px solid #8b5cf6;
            border-radius: 14px;
            color: white;
            font-size: 18px; 
            outline: none;
            transition: 0.3s ease;
        }
        .input-group input:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 25px rgba(245, 158, 11, 0.45);
            background: #07020d;
        }
        
        .pass-trigger {
            position: absolute;
            right: 20px;
            top: 48px; 
            cursor: pointer;
            font-size: 14px;
            color: #f472b6;
            font-weight: 700;
            text-transform: uppercase;
            user-select: none;
            letter-spacing: 0.5px;
        }
        .pass-trigger:hover { color: #d946ef; }

        .action-dispatch {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 20px;
        }
        .dispatch-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-size: 20px; 
            font-weight: 800;
            color: white;
            cursor: pointer;
            background: linear-gradient(135deg, #d946ef, #8b5cf6);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.35);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .dispatch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(217, 70, 239, 0.6);
        }

        .error-log {
            background: rgba(239, 68, 68, 0.15);
            border: 2px solid #ef4444;
            padding: 15px 20px;
            border-radius: 14px;
            margin-bottom: 25px;
            font-size: 16px;
            color: #fee2e2;
            text-align: center;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.1);
        }

        .clearance-loader {
            display: none;
            font-size: 15px;
            color: #f59e0b;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="gateway-matrix">
        
        <div class="gateway-header">
            <h1>EMS Login</h1>
            <p>Sign in to your account</p>
        </div>

        {% if error %}
            <div class="error-log">{{ error }}</div>
        {% endif %}

        <form action="/login" method="POST" id="loginForm">
            
            <div class="access-toggle-container">
                <button type="button" class="toggle-btn employee-active" id="empBtn" onclick="toggleInterfaceScope('employee')">Employee Portal</button>
                <button type="button" class="toggle-btn" id="admBtn" onclick="toggleInterfaceScope('admin')">Admin Panel</button>
            </div>
            <input type="hidden" name="role" id="roleInput" value="employee">

            <div class="form-matrix">
                
                <div class="input-group">
                    <label>Enter Email Address</label>
                    <input type="email" name="email" placeholder="name@company.com" required>
                </div>

                <div class="input-group">
                    <label>Enter Access Password</label>
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                    <span class="pass-trigger" onclick="togglePasswordVisibility()">Show</span>
                </div>

            </div>

            <div class="action-dispatch">
                <button class="dispatch-btn" id="loginBtn" type="submit">Authorize Entry</button>
                <div class="clearance-loader" id="loadingText">Verifying Network Security clearance...</div>
            </div>

        </form>

    </div>

<script>
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById("password");
        const triggerText = document.querySelector(".pass-trigger");
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            triggerText.innerText = "Hide";
        } else {
            passwordInput.type = "password";
            triggerText.innerText = "Show";
        }
    }

    function toggleInterfaceScope(selectedScope) {
        document.getElementById("roleInput").value = selectedScope;
        const employeeButton = document.getElementById("empBtn");
        const adminButton = document.getElementById("admBtn");
        const loginDispatchButton = document.getElementById("loginBtn");

        if (selectedScope === 'employee') {
            employeeButton.classList.add("employee-active");
            employeeButton.classList.remove("admin-active");
            adminButton.classList.remove("admin-active", "employee-active");
            
            loginDispatchButton.style.background = "linear-gradient(135deg, #d946ef, #8b5cf6)";
            loginDispatchButton.style.boxShadow = "0 8px 25px rgba(139, 92, 246, 0.35)";
        } else {
            adminButton.classList.add("admin-active");
            adminButton.classList.remove("employee-active");
            employeeButton.classList.remove("employee-active", "admin-active");
            
            loginDispatchButton.style.background = "linear-gradient(135deg, #059669, #22c55e)";
            loginDispatchButton.style.boxShadow = "0 8px 25px rgba(34, 197, 94, 0.35)";
        }
    }

    document.getElementById("loginForm").addEventListener("submit", function () {
        document.getElementById("loginBtn").disabled = true;
        document.getElementById("loadingText").style.display = "block";
    });
</script>
</body>
</html>

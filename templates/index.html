<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Employee Attrition Prediction</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;

            background:
            linear-gradient(rgba(3,8,6,0.88), rgba(3,8,6,0.92)),
            url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d")
            no-repeat center center/cover;

            min-height:100vh;
            overflow:hidden;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:12px;

            color:white;

            position:relative;
        }

        body::before{
            content:"";

            position:absolute;

            width:520px;
            height:520px;

            background:rgba(34,197,94,0.12);

            border-radius:50%;

            top:-150px;
            left:-120px;

            filter:blur(130px);

            z-index:0;
        }

        body::after{
            content:"";

            position:absolute;

            width:480px;
            height:480px;

            background:rgba(74,222,128,0.08);

            border-radius:50%;

            bottom:-180px;
            right:-120px;

            filter:blur(120px);

            z-index:0;
        }

        .container{
            width:95vw;
            height:95vh;

            position:relative;
            z-index:1;

            background: rgba(10, 15, 12, 0.72);

            border:1px solid rgba(74,222,128,0.22);

            border-radius:28px;

            backdrop-filter: blur(16px);

            box-shadow:
            0 0 0 1px rgba(74,222,128,0.10),
            0 0 25px rgba(74,222,128,0.14),
            0 0 60px rgba(34,197,94,0.10),
            0 25px 60px rgba(0,0,0,0.55),
            inset 0 0 25px rgba(255,255,255,0.02);

            padding:24px;

            display:flex;
            flex-direction:column;

            overflow:hidden;
        }

       .container::before{
            content:"";
            position:absolute;
            inset:0;
            border-radius:28px;
            padding:2px;

            background: linear-gradient(
                90deg,
                #16a34a,
                #4ade80,
                #22c55e,
                #86efac,
                #16a34a
            );

            -webkit-mask: 
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);

            -webkit-mask-composite: xor;
            mask-composite: exclude;

            pointer-events:none;

            box-shadow:
                0 0 12px rgba(74,222,128,0.45),
                0 0 25px rgba(34,197,94,0.35);

            animation: borderGlow 3s linear infinite;
        }

        -webkit-mask{
            linear-gradient:(#fff 0 0) content-box,
            linear-gradient(#fff 0 0);

            -webkit-mask-composite:xor;
            mask-composite:exclude;

            animation:borderGlow 4s linear infinite;
        }

        @keyframes borderGlow{
            0%{
                filter:hue-rotate(0deg);
            }

            100%{
                filter:hue-rotate(18deg);
            }
        }

        h1{
            text-align:center;

            font-size:48px;
            font-weight:800;

            margin-bottom:24px;

            letter-spacing:1px;

            background:linear-gradient(90deg,#ffffff,#4ade80,#86efac);

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;

            text-shadow:
            0 0 10px rgba(74,222,128,0.60),
            0 0 25px rgba(74,222,128,0.35),
            0 0 45px rgba(34,197,94,0.22);
        }

        form{
            display:flex;
            flex-direction:column;
            flex:1;

            overflow:hidden;
        }

        .grid{
            flex:1;

            display:grid;

            grid-template-columns:repeat(4,1fr);

            gap:14px;

            overflow-y:auto;

            padding-right:6px;
        }

        .field-box{
            background:rgba(255,255,255,0.05);

            border:1px solid rgba(74,222,128,0.10);

            border-radius:18px;

            padding:14px;

            min-height:110px;

            backdrop-filter: blur(8px);

            transition:0.35s ease;

            position:relative;

            overflow:hidden;

            box-shadow:
            inset 0 0 12px rgba(255,255,255,0.02);
        }

        .field-box::before{
            content:"";

            position:absolute;

            top:0;
            left:-100%;

            width:100%;
            height:2px;

            background:linear-gradient(
                90deg,
                transparent,
                #4ade80,
                transparent
            );

            transition:0.5s;
        }

        .field-box:hover::before{
            left:100%;
        }

        .field-box:hover{
            transform:translateY(-4px);

            border-color:rgba(74,222,128,0.35);

            box-shadow:
            0 10px 24px rgba(0,0,0,0.30),
            0 0 22px rgba(74,222,128,0.16);
        }

        .field-box:hover{
            transform:translateY(-4px);

            border-color:rgba(74,222,128,0.35);

            box-shadow:
            0 10px 24px rgba(0,0,0,0.30),
            0 0 22px rgba(74,222,128,0.16);
        }

        .field-box label{
            display:block;

            margin-bottom:12px;

            color:#f8fafc;

            font-size:26px;
            font-weight:700;
            letter-spacing:0.3px;
        }

        input,
        select{
            width:100%;

            padding:14px 15px;

            border:none;
            outline:none;

            border-radius:12px;

            background:rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);

            border:1px solid rgba(74,222,128,0.15);

            color:#e5e7eb;

            font-size:20px;
            font-weight:600;

            transition:0.3s;
        }
        
        input::placeholder{
            color:#6b7280;
        }

        input:focus,
        select:focus{
            transform:scale(1.01);

            box-shadow:
            0 0 0 3px rgba(74,222,128,0.28),
            0 0 20px rgba(74,222,128,0.22);
        }
        
        select option {
            background-color: #12072b !important;
            color: #e5e7eb !important;
        }

        button{
            width:35%;
            margin:20px auto 0 auto;

            padding:18px;

            border-radius:22px;

            border:1px solid rgba(74,222,128,0.45);

            background:
            linear-gradient(
                135deg,
                rgba(18,120,55,0.48),
                rgba(35,190,95,0.42),
                rgba(18,120,55,0.48)
            );

            backdrop-filter: blur(22px) saturate(190%);
            -webkit-backdrop-filter: blur(22px) saturate(190%);

            color:#f0fff4;

            font-size:32px;
            font-weight:800;

            cursor:pointer;

            transition:0.4s ease;

            position:relative;
            overflow:hidden;

            box-shadow:
            inset 0 1px 1px rgba(255,255,255,0.18),
            inset 0 -1px 1px rgba(255,255,255,0.06),
            0 0 0 1px rgba(74,222,128,0.15),
            0 0 35px rgba(34,197,94,0.45),
            0 0 90px rgba(74,222,128,0.22),
            0 15px 45px rgba(0,0,0,0.6);
        }

        button::after{
            content:"";

            position:absolute;

            top:0;
            left:0;

            width:100%;
            height:50%;

            background:linear-gradient(
                to bottom,
                rgba(255,255,255,0.24),
                rgba(255,255,255,0.03)
            );

            border-radius:22px;

            pointer-events:none;
        }

        button::before{
            content:"";

            position:absolute;

            top:0;
            left:-120px;

            width:80px;
            height:100%;

            background:rgba(255,255,255,0.28);

            transform:skewX(-20deg);

            transition:0.8s;
        }

        button:hover::before{
            left:120%;
        }

        button:hover{
            transform:translateY(-4px) scale(1.02);

            background:
            linear-gradient(
                135deg,
                rgba(28,150,70,0.58),
                rgba(60,255,140,0.45),
                rgba(28,150,70,0.58)
            );

            box-shadow:
            inset 0 1px 1px rgba(255,255,255,0.22),
            0 0 45px rgba(74,222,128,0.75),
            0 0 110px rgba(34,197,94,0.3),
            0 18px 42px rgba(0,0,0,0.55);
        }
        
        .result{
            width:fit-content;

            margin:24px auto 0 auto;

            padding:22px 42px;

            border-radius:22px;

            text-align:center;

            font-size:38px;
            font-weight:900;

            letter-spacing:1px;

            position:relative;

            overflow:hidden;

            backdrop-filter: blur(18px);

            border:1px solid rgba(255,255,255,0.15);

            animation:
            resultPop 0.7s ease,
            floating 2.5s ease-in-out infinite alternate;

            box-shadow:
            0 0 35px rgba(0,0,0,0.45),
            0 15px 55px rgba(0,0,0,0.45);
        }

        @keyframes resultPop{

            0%{
                transform:scale(0.6);
                opacity:0;
            }

            70%{
                transform:scale(1.08);
            }

            100%{
                transform:scale(1);
                opacity:1;
            }
        }

        .result.stay{

            color:#fff7cc;

            background:
            linear-gradient(
                135deg,
                rgba(255,215,0,0.22),
                rgba(255,193,7,0.10)
            );

            border:1px solid rgba(255,215,0,0.55);

            text-shadow:
            0 0 12px rgba(255,215,0,0.9),
            0 0 35px rgba(255,193,7,0.55);

            box-shadow:
            0 0 30px rgba(255,215,0,0.35),
            0 0 65px rgba(255,193,7,0.22),
            0 15px 50px rgba(0,0,0,0.45);
        }

        .result.leave{

            color:#ffe2e2;

            background:
            linear-gradient(
                135deg,
                rgba(239,68,68,0.24),
                rgba(127,29,29,0.16)
            );

            border:1px solid rgba(248,113,113,0.55);

            text-shadow:
            0 0 12px rgba(248,113,113,0.9),
            0 0 35px rgba(239,68,68,0.55);

            box-shadow:
            0 0 30px rgba(239,68,68,0.35),
            0 0 65px rgba(220,38,38,0.22),
            0 15px 50px rgba(0,0,0,0.45);
        }

        @keyframes resultGlow{

            from{
                box-shadow:
                0 0 0 1px rgba(74,222,128,0.08),
                0 0 18px rgba(34,197,94,0.18),
                0 12px 35px rgba(0,0,0,0.45);
            }

            to{
                box-shadow:
                0 0 0 1px rgba(74,222,128,0.14),
                0 0 35px rgba(74,222,128,0.32),
                0 14px 42px rgba(0,0,0,0.5);
            }
        }

        .grid::-webkit-scrollbar{
            width:8px;
        }

        .grid::-webkit-scrollbar-track{
            background:rgba(255,255,255,0.05);
            border-radius:10px;
        }

        .grid::-webkit-scrollbar-thumb{
            background:linear-gradient(#16a34a,#4ade80);
            border-radius:10px;
        }

        @media(max-width:1200px){

            .grid{
                grid-template-columns:repeat(3,1fr);
            }
        }

        @media(max-width:900px){

            .grid{
                grid-template-columns:repeat(2,1fr);
            }

            h1{
                font-size:36px;
            }

            button{
                font-size:24px;
            }

            .result{
                font-size:28px;
            }
        }

        @media(max-width:600px){

            body{
                padding:0;
            }

            .container{
                width:100%;
                height:100vh;

                border-radius:0;
            }

            .grid{
                grid-template-columns:1fr;
            }

            h1{
                font-size:28px;
            }

            button{
                font-size:20px;
                padding:16px;
            }

            .result{
                font-size:22px;
            }
        }

      .probability-box{

        margin-top:24px;

        display:flex;
        justify-content:center;
        gap:28px;

        font-size:24px;
        font-weight:800;
    }

    .stay-prob{

        min-width:300px;

        padding:22px 34px;

        border-radius:22px;

        text-align:center;

        background:
        linear-gradient(
            135deg,
            rgba(255,255,255,0.18),
            rgba(255,255,255,0.08)
        );

        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);

        border:1px solid rgba(255,255,255,0.28);

        color:#ffffff;

        box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.22),
        0 0 30px rgba(255,255,255,0.12),
        0 15px 45px rgba(0,0,0,0.45);

        letter-spacing:0.5px;
    }

    .leave-prob{

        min-width:300px;

        padding:22px 34px;

        border-radius:22px;

        text-align:center;

        background:
        linear-gradient(
            135deg,
            rgba(25,45,90,0.42),
            rgba(10,18,40,0.28)
        );

        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);

        border:1px solid rgba(96,165,250,0.35);

        color:#dbeafe;

        box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.08),
        0 0 28px rgba(59,130,246,0.18),
        0 15px 45px rgba(0,0,0,0.5);

        letter-spacing:0.5px;
    }

    .risk-box{

        width:fit-content;

        margin:20px auto;

        padding:16px 30px;

        border-radius:18px;

        font-size:28px;
        font-weight:800;

        background:rgba(255,255,255,0.08);

        border:1px solid rgba(255,255,255,0.2);

        backdrop-filter:blur(12px);
    }

    .dashboard-btn{
        position:absolute;

        top:18px;
        left:18px;

        z-index:999;

        text-decoration:none;

        padding:14px 18px;

        border-radius:16px;

        background:
        linear-gradient(
            135deg,
            rgba(18,120,55,0.55),
            rgba(35,190,95,0.45)
        );

        border:1px solid rgba(74,222,128,0.35);

        color:white;

        font-size:18px;
        font-weight:700;

        backdrop-filter:blur(12px);

        box-shadow:
        0 0 18px rgba(34,197,94,0.35),
        0 8px 20px rgba(0,0,0,0.35);

        transition:0.3s ease;
    }

    .dashboard-btn:hover{
        transform:translateY(-2px);

        box-shadow:
        0 0 28px rgba(74,222,128,0.55),
        0 12px 25px rgba(0,0,0,0.4);
    }
    </style>
</head>

<body>

<div class="container">

    <a href="/admin_employees" class="dashboard-btn">
        Back to Employee List
    </a> 

    <h1>EMPLOYEE ATTRITION PREDICTION</h1>

    <form action="/predict" method="post">

        <div class="grid">

            <div class="field-box" style="border-color: rgba(0, 240, 255, 0.45); background: rgba(0, 240, 255, 0.02);">
                <label style="color: #00f0ff;">Select Target Employee Profile</label>
                <select name="selected_employee_id" required style="border-color: rgba(0, 240, 255, 0.45);">
                    <option value="" disabled selected>-- Choose an Employee Profile Node --</option>
                    {% for worker in active_workers %}
                        <option value="{{ worker[0] }}">{{ worker[1] }} ({{ worker[0] }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="field-box">
                <label>Age</label>
                <input name="Age" placeholder="e.g., 35" required>
            </div>

            <div class="field-box">
                <label>Business Travel</label>
                <input name="BusinessTravel" placeholder="0 = None, 1 = Rare, 2 = Frequent" required>
            </div>

            <div class="field-box">
                <label>Daily Rate</label>
                <input name="DailyRate" placeholder="e.g., 800" required>
            </div>

            <div class="field-box">
                <label>Department</label>
                <input name="Department" placeholder="0 = HR, 1 = R&D, 2 = Sales" required>
            </div>

            <div class="field-box">
                <label>Distance From Home</label>
                <input name="DistanceFromHome" placeholder="Distance in miles/km" required>
            </div>

            <div class="field-box">
                <label>Education</label>
                <input name="Education" placeholder="Level 1 to 5" required>
            </div>

            <div class="field-box">
                <label>Education Field</label>
                <input name="EducationField" placeholder="Field Code (0 to 5)" required>
            </div>

            <div class="field-box">
                <label>Environment Satisfaction</label>
                <input name="EnvironmentSatisfaction" placeholder="Rating 1 (Low) to 4 (High)" required>
            </div>

            <div class="field-box">
                <label>Gender</label>
                <input name="Gender" placeholder="0 = Female, 1 = Male" required>
            </div>

            <div class="field-box">
                <label>Hourly Rate</label>
                <input name="HourlyRate" placeholder="Hourly wage amount" required>
            </div>

            <div class="field-box">
                <label>Job Involvement</label>
                <input name="JobInvolvement" placeholder="Rating 1 (Low) to 4 (High)" required>
            </div>

            <div class="field-box">
                <label>Job Level</label>
                <input name="JobLevel" placeholder="Grade level 1 to 5" required>
            </div>

            <div class="field-box">
                <label>Job Role</label>
                <input name="JobRole" placeholder="Role code (0 to 8)" required>
            </div>

            <div class="field-box">
                <label>Job Satisfaction</label>
                <input name="JobSatisfaction" placeholder="Rating 1 (Low) to 4 (High)" required>
            </div>

            <div class="field-box">
                <label>Marital Status</label>
                <input name="MaritalStatus" placeholder="0 = Divorced, 1 = Married, 2 = Single" required>
            </div>

            <div class="field-box">
                <label>Monthly Income</label>
                <input name="MonthlyIncome" placeholder="Monthly salary base" required>
            </div>

            <div class="field-box">
                <label>Monthly Rate</label>
                <input name="MonthlyRate" placeholder="Standard monthly rate" required>
            </div>

            <div class="field-box">
                <label>Num Companies Worked</label>
                <input name="NumCompaniesWorked" placeholder="Number of past employers" required>
            </div>

            <div class="field-box">
                <label>OverTime</label>
                <input name="OverTime" placeholder="0 = No, 1 = Yes" required>
            </div>

            <div class="field-box">
                <label>Percent Salary Hike</label>
                <input name="PercentSalaryHike" placeholder="Percentage increase value" required>
            </div>

            <div class="field-box">
                <label>Performance Rating</label>
                <input name="PerformanceRating" placeholder="Rating Score (1 to 4)" required>
            </div>

            <div class="field-box">
                <label>Relationship Satisfaction</label>
                <input name="RelationshipSatisfaction" placeholder="Rating 1 (Low) to 4 (High)" required>
            </div>

            <div class="field-box">
                <label>Stock Option Level</label>
                <input name="StockOptionLevel" placeholder="Option tier (0 to 3)" required>
            </div>

            <div class="field-box">
                <label>Total Working Years</label>
                <input name="TotalWorkingYears" placeholder="Total career duration" required>
            </div>

            <div class="field-box">
                <label>Training Times Last Year</label>
                <input name="TrainingTimesLastYear" placeholder="Count of courses attended" required>
            </div>

            <div class="field-box">
                <label>Work Life Balance</label>
                <input name="WorkLifeBalance" placeholder="Rating 1 (Bad) to 4 (Best)" required>
            </div>

            <div class="field-box">
                <label>Years At Company</label>
                <input name="YearsAtCompany" placeholder="Total years worked in this company" required>
            </div>

            <div class="field-box">
                <label>Years In Current Role</label>
                <input name="YearsInCurrentRole" placeholder="Duration in active position" required>
            </div>

            <div class="field-box">
                <label>Years Since Last Promotion</label>
                <input name="YearsSinceLastPromotion" placeholder="Time since last promotion" required>
            </div>

            <div class="field-box">
                <label>Years With Curr Manager</label>
                <input name="YearsWithCurrManager" placeholder="Years working under current manager" required>
            </div>

        </div>

        <button type="submit">Predict Attrition</button>

    </form>

    {% if prediction_text %}
    <div class="result {% if 'Leave' in prediction_text or 'leave' in prediction_text %}leave{% else %}stay{% endif %}">
        {{ prediction_text }}
    </div>
    {% endif %}

    {% if stay_prob %}
    <div class="probability-box">

        <div class="stay-prob">
            Stay Probability: {{ stay_prob }}%
        </div>

        <div class="leave-prob">
            Leave Probability: {{ leave_prob }}%
        </div>

    </div>
    {% endif %}

</div>

<script>
    {% if prediction_text %}
        window.location.href = "/dashboard";
    {% endif %}
</script>

</body>
</html>
